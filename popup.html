<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="popup.js"></script>
    <script defer src="darkMode.js"></script>
    <script src="mlb-video-matcher.js"></script>
    <meta charset="UTF-8">
    <style>

html {
    scrollbar-width: none;
}

html::-webkit-scrollbar {
    display: none;
}

body {
    width: 600px;
    min-height: 600px;
    font-family: "Rubik", sans-serif;
    transform: scale(0.9);
    transform-origin: top left;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

body.dark-mode #popup-container {
    background-color: #101012;
    color: #ffffff;
}

#popup-container {
    width: 600px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    background-color: #f7fafc;
    padding: 0;
    margin-left: 40px;
}

.winning-pitcher, .losing-pitcher {
    color: #bf0d3d;
    font-weight: 500;
}

.starter-hand {
    color: #bf0d3d;
    font-style: italic;
}

.performer-image {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 3px solid #D7827E;
    object-fit: cover;
    margin-bottom: 8px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.top-performer {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    padding: 10px;
}

.performer-name {
    font-weight: 400;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    text-align: center;
}

.performer-name span { display: block; }

.performer-stats {
    font-size: 12px;
    color: #bf0d3d;
    font-weight: 500;
}

.video-button {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.avg-progress-bar {
    width: 40px;
    height: 3px;
    background-color: #f7fafc;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
}

.avg-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #bf0d3d 0%, #d63761 100%);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
}

@keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
}

    </style>
</head>
<body>
<button id="backButton">Go Back</button>
<script src="button.js"></script>
</body>
</html>
